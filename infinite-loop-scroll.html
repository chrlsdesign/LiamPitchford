<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Infinite Loop Scroll</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2ede6;
    --ink: #1a1208;
    --accent: #d4420c;
    --rule: rgba(26,18,8,0.12);
    --card-bg: #fff;
    --mono: 'Syne Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  html, body {
    height: 100%;
    overflow: hidden; /* We control ALL scrolling ourselves */
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    touch-action: none; /* prevent native scroll */
  }

  /* ── viewport container ── */
  #viewport {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  /* ── the strip that moves ── */
  #strip {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    will-change: transform;
  }

  /* ── grid wrapper (home_list) ── */
  .home_list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 12px;
    overflow: visible;
  }

  /* ── card (home_item) ── */
  .home_item {
    background: var(--card-bg);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .item-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    width: fit-content;
    border: 1px solid var(--rule);
    color: rgba(26,18,8,0.45);
  }

  .item-tag.red   { color: var(--accent); border-color: rgba(212,66,12,0.25); }
  .item-tag.green { color: #2d7a3a;       border-color: rgba(45,122,58,0.25); }
  .item-tag.blue  { color: #1a4fa8;       border-color: rgba(26,79,168,0.25); }

  .item-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .item-body {
    font-size: 12px;
    line-height: 1.6;
    color: rgba(26,18,8,0.45);
    flex: 1;
  }

  .item-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }

  .item-num {
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(26,18,8,0.2);
  }

  .item-deco {
    position: absolute;
    bottom: -8px;
    right: 10px;
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    color: rgba(26,18,8,0.03);
    letter-spacing: -0.04em;
    pointer-events: none;
    user-select: none;
  }

  /* wide card spans both columns */
  .home_item.wide {
    grid-column: span 2;
    background: var(--ink);
    color: var(--bg);
    flex-direction: row;
    align-items: center;
    gap: 20px;
  }

  .home_item.wide .item-title { color: var(--bg); font-size: 18px; flex: 1; }
  .home_item.wide .item-body  { color: rgba(242,237,230,0.45); }
  .home_item.wide .wide-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(212,66,12,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  /* ── nav ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(242,237,230,0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--rule);
  }

  .nav-logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--ink);
  }

  .nav-logo span { color: var(--accent); }

  .loop-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--accent);
    background: rgba(212,66,12,0.08);
    border: 1px solid rgba(212,66,12,0.2);
    padding: 4px 10px;
    border-radius: 100px;
  }

  /* ── progress bar ── */
  #progress-track {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    z-index: 200;
    background: rgba(26,18,8,0.08);
  }

  #progress-fill {
    width: 100%;
    background: var(--accent);
    transform-origin: top;
    transition: height 0.05s linear;
  }

  /* ── loop indicator ── */
  #loop-count {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 200;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: rgba(26,18,8,0.35);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #loop-count .n {
    color: var(--accent);
    font-weight: 700;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }

  #loop-count.bump .n { transform: scale(1.4); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">loop<span>.</span></div>
  <div class="loop-badge">∞ infinite</div>
</nav>

<div id="viewport">
  <div id="strip">
    <!-- JS will build sections here and clone them -->
  </div>
</div>

<div id="progress-track">
  <div id="progress-fill"></div>
</div>

<div id="loop-count">
  LOOP <span class="n" id="loop-num">0</span>
</div>

<script>
/* ═══════════════════════════════════════════════
   INFINITE LOOP SCROLL — grid card layout
   Structure: [home_list.before] [home_list.original] [home_list.after]
   Each .home_list is its own grid containing .home_item cards
   translateY goes on #strip (home_content--wrap equivalent)
═══════════════════════════════════════════════ */

  /* ── Build a .home_list grid of .home_item cards ── */
  function buildGrid(data, isClone) {
    const list = document.createElement('div');
    list.className = 'home_list';
    if (isClone) list.setAttribute('aria-hidden', 'true');

    data.forEach(d => {
      const card = document.createElement('div');
      card.className = 'home_item' + (d.wide ? ' wide' : '');

      if (d.wide) {
        card.innerHTML = `
          <div class="wide-icon">${d.icon}</div>
          <div>
            <div class="item-title">${d.title}</div>
            <div class="item-body">${d.body}</div>
          </div>
        `;
      } else {
        card.innerHTML = `
          <div class="item-tag ${d.tagCls}">${d.tag}</div>
          <div class="item-title">${d.title}</div>
          <div class="item-body">${d.body}</div>
          <div class="item-foot">
            <span class="item-num">${d.num}</span>
          </div>
          <div class="item-deco">${d.num}</div>
        `;
      }
      list.appendChild(card);
    });

    return list;
  }

  const strip = document.getElementById('strip');

  const gridBefore   = buildGrid(cardsData, true);
  const gridOriginal = buildGrid(cardsData, false);
  const gridAfter    = buildGrid(cardsData, true);

  // DOM order: [before] [original] [after]
  strip.appendChild(gridBefore);
  strip.appendChild(gridOriginal);
  strip.appendChild(gridAfter);

  /* ── Scroll engine ── */
  // We start offset by -origH so the user sees the originals, not the prepended clones
  // origH is computed after layout, so we defer start offset into rAF

  const FRICTION    = 0.075;
  const WHEEL_SPEED = 0.8;
  const TOUCH_SPEED = 1.0;
  const MOMENTUM    = 0.92;

  let currentY  = 0;
  let targetY   = 0;
  let velocity  = 0;
  let lastTime  = null;
  let loopCount = 0;
  let started   = false;

  let touching   = false;
  let touchLastY = 0;
  let touchVel   = 0;
  let touchLastT = 0;

  function getOriginalHeight() {
    return gridOriginal.offsetHeight;
  }

  function loop(ts) {
    if (!lastTime) lastTime = ts;
    lastTime = ts;

    // On first frame, offset so originals are in view (clonesBefore sits above)
    if (!started) {
      const origH = getOriginalHeight();
      currentY = -origH;
      targetY  = -origH;
      started  = true;
    }

    if (!touching) {
      targetY  += velocity;
      velocity *= MOMENTUM;
      if (Math.abs(velocity) < 0.01) velocity = 0;
    }

    // Lerp toward target
    currentY += (targetY - currentY) * FRICTION;

    const origH = getOriginalHeight();

    // ── Teleport DOWN → wrap to top
    // strip layout: [clonesBefore=origH][originals=origH][clonesAfter=origH]
    // when currentY goes below  -(2*origH)  we've left the originals downward
    if (currentY < -(2 * origH)) {
      currentY += origH;
      targetY  += origH;
      loopCount++;
      bumpLoopCount('+');
    }

    // ── Teleport UP → wrap to bottom
    // when currentY goes above  0  we've left the originals upward (into void)
    if (currentY > 0) {
      currentY -= origH;
      targetY  -= origH;
      loopCount--;
      bumpLoopCount('-');
    }

    strip.style.transform = `translateY(${Math.round(currentY)}px)`;

    // Progress bar: position within current loop (0-100%)
    const posInLoop = (((-currentY - origH) % origH) + origH) % origH;
    const pct = posInLoop / origH * 100;
    document.getElementById('progress-fill').style.height = pct + '%';

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);

  /* ── Mouse wheel ── */
  window.addEventListener('wheel', e => {
    e.preventDefault();
    targetY -= e.deltaY * WHEEL_SPEED;
  }, { passive: false });

  /* ── Touch ── */
  window.addEventListener('touchstart', e => {
    touching   = true;
    touchLastY = e.touches[0].clientY;
    touchVel   = 0;
    touchLastT = performance.now();
    velocity   = 0;
  }, { passive: true });

  window.addEventListener('touchmove', e => {
    e.preventDefault();
    const y   = e.touches[0].clientY;
    const now = performance.now();
    const dt  = now - touchLastT || 1;
    const dy  = (touchLastY - y) * TOUCH_SPEED;

    targetY   -= dy;
    touchVel   = -dy / dt * 16;
    touchLastY = y;
    touchLastT = now;
  }, { passive: false });

  window.addEventListener('touchend', () => {
    touching = false;
    velocity = touchVel * 12;
  });

  /* ── Loop counter ── */
  const loopNumEl = document.getElementById('loop-num');
  const loopLabel = document.getElementById('loop-count');

  function bumpLoopCount(dir) {
    loopNumEl.textContent = loopCount;
    loopLabel.classList.remove('bump');
    void loopLabel.offsetWidth;
    loopLabel.classList.add('bump');
    setTimeout(() => loopLabel.classList.remove('bump'), 300);
  }
</script>
</body>
</html>
